<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!--
      Dev: http://localhost:* 用于 Vite HMR。生产发布前应去掉本地主机通配。
      Prod: DeepSeek 请求由 Main Process 发出，因此不需要在 renderer CSP 中放 api.deepseek.com。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: http://localhost:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>赛博宇的桌面AI宠物</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
